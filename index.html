<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apex Elite Zentrale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00ff00; --bg: #000; --card: #111; --error: #ff3b30; }
        
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 20px; text-align: center;
        }

        /* VERIFIZIERUNG */
        #verify-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        #main-content { display: none; }

        .logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon); margin: 0 auto 15px auto; display: block; object-fit: cover; }
        h1 { font-size: 1.1rem; margin: 0 0 20px 0; letter-spacing: 2px; text-transform: uppercase; }

        /* NAVIGATION */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 25px; justify-content: center; }
        .tab { padding: 10px 15px; border: 1px solid var(--neon); border-radius: 25px; font-size: 0.75rem; cursor: pointer; }
        .tab.active { background: var(--neon); color: #000; font-weight: bold; }

        /* SEKTOR-LISTE (STRENG VERTIKAL) */
        .page { display: none; }
        .page.active { display: block; }

        .sector-block { 
            background: var(--card); border: 1px solid #222; border-radius: 16px; 
            padding: 20px; margin-bottom: 20px; 
            display: block; /* Kein Flexbox hier, um Stapelung zu garantieren */
        }
        
        .sector-title { 
            font-weight: bold; font-size: 1rem; color: #fff; 
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #222;
            display: block; width: 100%;
        }

        /* BUTTONS: LINKTREE STYLE (UNTEREINANDER) */
        .btn-link {
            display: block; /* Erzwingt neue Zeile */
            width: 100%; 
            padding: 16px 0; 
            margin: 12px 0; /* Mehr Abstand zwischen den Buttons */
            background: transparent; border: 1.5px solid var(--neon); color: var(--neon);
            border-radius: 35px; font-weight: 700; cursor: pointer; 
            font-size: 0.9rem; text-transform: uppercase;
            box-sizing: border-box;
        }
        .btn-link:active { background: rgba(0, 255, 0, 0.1); transform: scale(0.97); }
        
        .btn-takeover { border-color: var(--error); color: var(--error); }
        .btn-logout { border: none; color: #444; margin-top: 40px; font-size: 0.75rem; }

        .info-text { background: #0a0a0a; border-radius: 12px; padding: 20px; text-align: left; font-size: 0.9rem; color: #ccc; }
    </style>
</head>
<body>

    <div id="verify-screen">
        <div style="border: 1px solid var(--neon); padding: 40px 20px; border-radius: 20px; width: 80%;">
            <img src="https://raw.githubusercontent.com/ApexElite420/apex-zentrale/main/logo1.png.jpg" alt="Logo" class="logo">
            <h1>ZENTRALE</h1>
            <button class="btn-link" onclick="grantAccess()">ICH BESTÄTIGE</button>
        </div>
    </div>

    <div id="main-content">
        <img src="https://raw.githubusercontent.com/ApexElite420/apex-zentrale/main/logo1.png.jpg" alt="Logo" class="logo">
        <h1>APEX ZENTRALE</h1>

        <div class="nav-tabs">
            <div class="tab active" onclick="showPage('control', this)">SEKTOREN</div>
            <div class="tab" onclick="showPage('rules', this)">REGELN</div>
            <div class="tab" onclick="showPage('support', this)">SUPPORT</div>
        </div>

        <div id="page-control" class="page active">
            <div id="sector-list"></div>
        </div>

        <div id="page-rules" class="page">
            <div class="info-text">
                <b>🛡️ PROTOKOLL:</b><br><br>
                1. GEHORSAM GEGENÜBER SA<br>
                2. KEINE UNBEFUGTE BOT-NUTZUNG<br>
                3. LOYALITÄT ZUR ELITE
            </div>
            <button class="btn-link" style="margin-top:20px" onclick="tg.sendData('regeln_akzeptiert')">AKZEPTIEREN</button>
        </div>

        <div id="page-support" class="page">
            <button class="btn-link" onclick="tg.sendData('support')">TICKET ERSTELLEN</button>
            <button class="btn-link" onclick="window.open('https://t.me/ApexElite_Official420')">KONTAKT (TG)</button>
        </div>

        <button class="btn-link btn-logout" onclick="tg.close()">LOGOUT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const API_BASE = "https://8080-cs-b5c454fa-e76c-418e-b16c-f52d280aa155.cs-europe-west4-fycr.cloudshell.dev";

        function checkAuth() {
            if (localStorage.getItem('apex_verified') === 'true') {
                document.getElementById('main-content').style.display = 'block';
                loadSectors();
            } else {
                document.getElementById('verify-screen').style.display = 'flex';
            }
        }

        function grantAccess() {
            tg.HapticFeedback.impactOccurred('medium');
            localStorage.setItem('apex_verified', 'true');
            document.getElementById('verify-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadSectors();
        }

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            el.classList.add('active');
        }

        async function loadSectors() {
            const list = document.getElementById('sector-list');
            list.innerHTML = "<div style='font-size:0.75rem; color:#444; margin-top:20px;'>LADE DATEN...</div>";
            try {
                const response = await fetch(`${API_BASE}/api/data`);
                const data = await response.json();
                list.innerHTML = "";
                
                data.sectors.forEach(s => {
                    const block = document.createElement('div');
                    block.className = 'sector-block';
                    // Jeder Button bekommt ein eigenes div-Wrapper-Element für 100% Stapelung
                    block.innerHTML = `
                        <div class="sector-title">📍 ${s.title}</div>
                        <div><button class="btn-link btn-takeover" onclick="sendCommand('takeover', '${s.id}')">🏴‍☠️ TAKEOVER</button></div>
                        <div><button class="btn-link" onclick="sendCommand('release', '${s.id}')">🔓 RELEASE</button></div>
                    `;
                    list.appendChild(block);
                });
            } catch (e) {
                list.innerHTML = "<div class='info-text'>📡 FUNKSTÖRUNG ZUR CLOUDSHELL!</div>";
            }
        }

        async function sendCommand(action, targetId) {
            try {
                await fetch(`${API_BASE}/api/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, target: targetId })
                });
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert(`AKTION ${action.toUpperCase()} GESTARTET.`);
            } catch (e) {
                tg.showAlert("FEHLER!");
            }
        }

        checkAuth();
    </script>
</body>
</html>
