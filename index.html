<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apex Elite Zentrale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00ff00; --bg: #000; --card: #111; }
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 20px; text-align: center;
        }
        
        /* VERIFIZIERUNG SCREEN */
        #verify-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }
        .verify-box {
            border: 1px solid var(--neon); padding: 40px 20px; border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1); width: 100%; max-width: 320px;
        }

        /* MAIN CONTENT */
        #main-content { display: none; }

        /* UI ELEMENTS */
        .logo { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--neon); margin-bottom: 15px; object-fit: cover; }
        h1 { font-size: 1.1rem; margin: 0 0 10px 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 25px; justify-content: center; }
        .tab { padding: 8px 12px; border: 1px solid var(--neon); border-radius: 20px; font-size: 0.75rem; cursor: pointer; }
        .tab.active { background: var(--neon); color: #000; font-weight: bold; }

        .page { display: none; }
        .page.active { display: block; }

        .sector-block { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; }
        
        .btn-link {
            display: block; width: 100%; padding: 14px; margin: 8px 0;
            background: transparent; border: 1.5px solid var(--neon); color: var(--neon);
            border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
            text-transform: uppercase;
        }
        .btn-link:active { background: rgba(0, 255, 0, 0.1); transform: scale(0.98); }
        .btn-takeover { border-color: #ff3b30; color: #ff3b30; }
    </style>
</head>
<body>

    <div id="verify-screen">
        <div class="verify-box">
            <img src="https://raw.githubusercontent.com/ApexElite420/apex-zentrale/main/logo1.png.jpg" alt="Logo" class="logo" style="margin: 0 auto 20px auto;">
            <h2 style="font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 25px;">SICHERHEITS-CHECK</h2>
            <p style="font-size: 0.85rem; color: #888; margin-bottom: 30px;">BESTÄTIGEN SIE IHRE IDENTITÄT,<br>UM FORTZUFAHREN.</p>
            <button class="btn-link" onclick="grantAccess()">ICH BIN EIN MENSCH</button>
        </div>
    </div>

    <div id="main-content">
        <h1>APEX ZENTRALE</h1>
        <div id="status" style="font-size: 0.7rem; color: #555; margin-bottom: 20px;">SYSTEM STATUS: ONLINE</div>

        <div class="nav-tabs">
            <div class="tab active" onclick="showPage('control', this)">SEKTOREN</div>
            <div class="tab" onclick="showPage('rules', this)">REGELN</div>
            <div class="tab" onclick="showPage('support', this)">SUPPORT</div>
        </div>

        <div id="page-control" class="page active">
            <div id="sector-list"></div>
        </div>

        <div id="page-rules" class="page">
            <div style="background:#0a0a0a; padding:20px; border-radius:12px; text-align:left; font-size:0.85rem; line-height:1.6;">
                <b>🛡️ PROTOKOLL:</b><br><br>
                • GEHORSAM GEGENÜBER SA<br>
                • KEINE UNBEFUGTE BOT-NUTZUNG<br>
                • LOYALITÄT ZUR APEX ELITE
            </div>
            <button class="btn-link" style="margin-top:20px" onclick="tg.sendData('regeln_akzeptiert')">PROTOKOLL AKZEPTIEREN</button>
        </div>

        <div id="page-support" class="page">
            <button class="btn-link" onclick="tg.sendData('support')">TICKET ERSTELLEN</button>
            <button class="btn-link" onclick="window.open('https://t.me/ApexElite_Official420')">DIREKT-KONTAKT</button>
        </div>

        <button class="btn-link" style="border:none; color:#333; margin-top:30px; font-size:0.7rem;" onclick="tg.close()">ABMELDEN</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const API_BASE = "https://8080-cs-b5c454fa-e76c-418e-b16c-f52d280aa155.cs-europe-west4-fycr.cloudshell.dev";

        function grantAccess() {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('verify-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadSectors();
        }

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            el.classList.add('active');
        }

        async function loadSectors() {
            const list = document.getElementById('sector-list');
            list.innerHTML = "<div style='font-size:0.7rem; color:#444;'>LADE SEKTOREN...</div>";
            try {
                const response = await fetch(`${API_BASE}/api/data`);
                const data = await response.json();
                list.innerHTML = "";
                data.sectors.forEach(s => {
                    const block = document.createElement('div');
                    block.className = 'sector-block';
                    block.innerHTML = `
                        <div style="font-weight:bold; font-size:0.9rem; margin-bottom:12px;">📍 ${s.title}</div>
                        <button class="btn-link btn-takeover" onclick="sendCommand('takeover', '${s.id}')">🏴‍☠️ TAKEOVER</button>
                        <button class="btn-link" onclick="sendCommand('release', '${s.id}')">🔓 RELEASE</button>
                    `;
                    list.appendChild(block);
                });
            } catch (e) {
                list.innerHTML = "<div style='color:#ff3b30; font-size:0.8rem;'>FUNKSTÖRUNG ZUR ZENTRALE</div>";
            }
        }

        async function sendCommand(action, targetId) {
            try {
                await fetch(`${API_BASE}/api/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, target: targetId })
                });
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert(`AKTION ${action.toUpperCase()} GESTARTET.`);
            } catch (e) {
                tg.showAlert("FEHLER!");
            }
        }
    </script>
</body>
</html>
