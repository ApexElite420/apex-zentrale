<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apex Elite Zentrale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            padding: 20px;
            overflow: hidden; 
        }
        .header { 
            border: 2px solid #00ff00; 
            padding: 20px; 
            margin-bottom: 25px; 
            box-shadow: 0 0 15px #00ff00; 
            text-transform: uppercase;
        }
        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            text-shadow: 0 0 10px #00ff00;
        }
        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 20px; 
            margin: 15px 0; 
            background: #111; 
            border: 2px solid #00ff00; 
            color: #00ff00; 
            font-weight: bold; 
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: inset 0 0 5px #00ff00;
            transition: 0.2s;
        }
        .btn:active { 
            background: #00ff00; 
            color: #000; 
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>APEX ELITE</h1>
        <p>COMMAND CENTER • SYSTEM ONLINE</p>
    </div>

    <button class="btn" onclick="sendToBot('regeln')">📜 REGELN</button>
    <button class="btn" onclick="sendToBot('support')">🆘 SUPPORT</button>
    <button class="btn" onclick="closeApp()">❌ SCHLIESSEN</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); 
        tg.expand();

        function sendToBot(command) {
            tg.sendData(command); 
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
