<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apex Elite Zentrale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            padding: 20px;
        }
        .header { 
            border: 2px solid #00ff00; 
            padding: 15px; 
            margin-bottom: 25px; 
            box-shadow: 0 0 20px #00ff00; 
            text-transform: uppercase;
        }
        .logo {
            width: 100px; height: 100px; 
            border-radius: 50%; border: 3px solid #00ff00; 
            box-shadow: 0 0 15px #00ff00; 
            margin: 0 auto 10px auto; display: block;
            object-fit: cover;
        }
        .header h1 { font-size: 1.5rem; margin: 5px 0; text-shadow: 0 0 10px #00ff00; }
        #user-welcome { font-size: 1rem; color: #fff; margin-bottom: 5px; }
        
        .btn { 
            display: block; width: 100%; padding: 18px; margin: 12px 0; 
            background: #111; border: 2px solid #00ff00; color: #00ff00; 
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            border-radius: 8px; box-shadow: inset 0 0 5px #00ff00;
        }
        .btn:active { background: #00ff00; color: #000; transform: scale(0.96); }
        .btn-red { border-color: #ff0000; color: #ff0000; box-shadow: inset 0 0 5px #ff0000; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/ApexElite420/apex-zentrale/main/logo1.png.jpg" alt="Logo" class="logo">
        <div id="user-welcome">Initialisiere...</div>
        <h1>APEX ELITE</h1>
    </div>

    <button class="btn" onclick="executeCommand('takeover', -100123456789)">🏴‍☠️ TAKEOVER TEST</button>
    <button class="btn" onclick="executeCommand('release', -100123456789)">🔓 RELEASE TEST</button>
    <button class="btn btn-red" onclick="tg.close()">❌ TERMINAL SCHLIESSEN</button>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // DEINE CLOUDSHELL URL
        const API_BASE = "https://8080-cs-b5c454fa-e76c-418e-b16c-f52d280aa155.cs-europe-west4-fycr.cloudshell.dev";

        const user = tg.initDataUnsafe.user;
        if (user) document.getElementById('user-welcome').innerText = `Willkommen, ${user.first_name}`;

        function playClick() {
            const sound = document.getElementById('clickSound');
            sound.currentTime = 0;
            sound.play();
        }

        async function executeCommand(action, targetId) {
            playClick();
            console.log(`Sende ${action} an ${targetId}`);

            try {
                const response = await fetch(`${API_BASE}/api/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, target: targetId })
                });

                const result = await response.json();
                
                if (result.status === "success") {
                    tg.showAlert("✅ Befehl ausgeführt: " + result.msg);
                } else {
                    tg.showAlert("❌ Fehler: " + result.reason);
                }
            } catch (error) {
                tg.showAlert("📡 Funkstörung! Ist die CloudShell online?");
            }
        }
    </script>
</body>
</html>
